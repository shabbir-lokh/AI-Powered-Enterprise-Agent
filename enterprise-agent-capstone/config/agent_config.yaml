# Agent Configuration File

agent:
  name: "EnterpriseAgent"
  version: "0.1.0"
  description: "Enterprise automation agent"

llm:
  provider: "openai"  # openai, anthropic, etc.
  model: "gpt-4"
  temperature: 0.7
  max_tokens: 2000
  
tools:
  # Define tools your agent will use
  enabled:
    - "web_search"
    - "file_operations"
    - "api_calls"

logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/agent.log"
  console: true

performance:
  max_retries: 3
  timeout_seconds: 30
  cache_enabled: true
